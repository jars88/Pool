<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pool BI | Hub</title>
  <style>
    :root{--vale:#007E7A;--vale-dark:#006763;--vale-gold:#EDB111;--vale-aqua:#0ABB98;--vale-blue:#3CB5E5;--vale-cherry:#C0305E;--vale-orange:#E37222;--vale-gray:#555555;--bg:#f8fafc;--line:#e2e8f0;--muted:#64748b;--green:#059669}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:#0f172a;font-family:Inter,Segoe UI,Arial,sans-serif}
    .app{min-height:100vh;display:grid;grid-template-columns:270px 1fr}
    aside{position:fixed;inset:0 auto 0 0;width:270px;background:white;color:#334155;padding:26px 22px;border-right:1px solid var(--line)}
    .valeMark{display:flex;align-items:center;margin-bottom:22px}.valeMark img{width:136px;height:auto;display:block}.brand{font-size:18px;font-weight:800;letter-spacing:.02em;margin-bottom:30px}.brand span{display:block;margin-top:6px;color:#64748b;font-size:12px}
    nav a{display:flex;gap:10px;align-items:center;color:#475569;text-decoration:none;padding:11px 12px;border-radius:8px;margin-bottom:8px;font-weight:700}
    nav a.active,nav a:hover{background:#e6f3f1;color:var(--vale-dark)}.dot{width:9px;height:9px;border-radius:50%;background:var(--vale-gold)}
    main{grid-column:2;min-height:100vh;padding:42px;display:grid;place-items:center}.hub{width:min(620px,100%);display:grid;justify-items:center}.primary{display:flex;align-items:center;justify-content:center;text-align:center;background:var(--vale);color:white;text-decoration:none;border-radius:8px;padding:18px 22px;font-weight:900;font-size:20px;line-height:1.25;box-shadow:0 14px 30px #007e7a26}.primary:hover{background:var(--vale-dark)}
    @media(max-width:850px){.app{display:block}aside{position:static;width:auto}main{padding:24px;min-height:55vh}.primary{font-size:18px}}
  </style>
</head>
